# =====================================================
# 离线工具平台 v14.0 工具列表（包组形式）
# 格式：工具ID|中文描述|RPM包组/包名|DEB包组/包名
# 
# 说明：
# - 工具ID: 唯一标识符，用于内部引用
# - 中文描述: 用户看到的工具名称和描述
# - RPM包组: openEuler/CentOS/Rocky等RPM系统的包组或包名（支持通配符）
# - DEB包组: Ubuntu/Kylin等DEB系统的包组或包名（支持通配符）
# - 如果某列以 @ 开头，表示是包组名称
# - 如果包含 *，表示使用通配符匹配多个包
# =====================================================


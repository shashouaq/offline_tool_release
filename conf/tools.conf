# =====================================================
# Offline Tools Platform v1.0 - tool catalog
# Format: tool_id|zh_description|rpm_packages_or_groups|deb_packages_or_groups
#
# Notes:
# - tool_id is the internal stable identifier.
# - Descriptions are user-facing and should stay concise.
# - RPM/DEB fields may contain package names, package groups, or wildcards.
# - Values starting with @ are treated as package groups.
# =====================================================


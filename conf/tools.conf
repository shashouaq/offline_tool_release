# ── GUI桌面环境（使用包组或通配符）───────────────────────
# 注意：不同发行版的包组名称可能不同

# UKUI桌面环境（麒麟系统/openEuler）
# 参考：D:\arm\ukui_offline\download_ukui_arm.sh
# openEuler使用包组名：ukui-desktop-environment
# ⚠️ 重要提示：UKUI是麒麟系统的桌面环境，在openEuler上可能不可用
# 如果下载失败，请运行以下命令验证：
#   dnf group list | grep -i ukui
#   dnf search ukui
# 或者从本配置中注释掉该行
ukui-desktop|UKUI桌面环境全套组件|ukui-desktop-environment|ukui-desktop-environment


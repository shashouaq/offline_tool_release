# =====================================================
# Offline Tools Platform V1 source configuration
# Active sources are release-gated by utils/check_sources.sh.
# RPM sources are checked by repodata/repomd.xml.
# DEB sources are checked by dists/<codename>/InRelease or Release.
# $ARCH is expanded to x86_64 / aarch64 for RPM targets.
# =====================================================

# ===== openEuler 22.03 LTS SP4 =====
[openEuler22.03]
PKG_TYPE=rpm
RELEASEVER=22.03LTS
REPOS=(
"https://dl-cdn.openeuler.openatom.cn/openEuler-22.03-LTS-SP4/OS/$ARCH/"
"https://dl-cdn.openeuler.openatom.cn/openEuler-22.03-LTS-SP4/everything/$ARCH/"
